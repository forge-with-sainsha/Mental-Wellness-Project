<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare — My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-purple shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/dashboard.html"><i class="bi bi-heart-pulse-fill me-2"></i>MindCare</a>
      <a class="btn btn-outline-light btn-sm" href="#" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </nav>

  <main class="container py-4" style="max-width:620px">
    <a href="/dashboard.html" class="text-muted small text-decoration-none">
      <i class="bi bi-chevron-left me-1"></i>Dashboard
    </a>
    <h4 class="mt-2 fw-bold mb-4">My Profile</h4>

    <!-- Profile info -->
    <div class="card stat-card p-4 mb-4">
      <h6 class="fw-semibold mb-3"><i class="bi bi-person-circle me-2 text-purple"></i>Account Information</h6>
      <div id="profileAlert" class="alert d-none py-2"></div>

      <form id="profileForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="fullName" class="form-control" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3 text-muted small">
          <i class="bi bi-calendar3 me-1"></i>Member since: <span id="memberSince">—</span>
        </div>
        
          <span id="profileSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
      </form>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
