<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare — Your Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-purple shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/dashboard.html"><i class="bi bi-heart-pulse-fill me-2"></i>MindCare</a>
      <a class="btn btn-outline-light btn-sm" href="#" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </nav>

  <main class="container py-4" style="max-width:760px">
    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-purple"></div>
      <p class="mt-3 text-muted">Loading your results…</p>
    </div>

    <div id="resultsContent" class="d-none">
      <!-- Score card -->
      <div class="card stat-card text-center p-5 mb-4" id="scoreCard">
        <div class="text-muted small mb-2">Your Stress Score</div>
        <div class="score-display mb-3" id="scoreValue">—</div>
        <div class="mb-2" id="levelBadge"></div>
        <div class="text-muted small" id="scoreDate"></div>
        <div class="mt-3 small text-muted" id="scoreRange"></div>
      </div>

      <!-- Recommendations -->
      <h5 class="fw-bold mb-3"><i class="bi bi-lightbulb me-2 text-warning"></i>Personalised Recommendations</h5>
      <div id="recommendationsList" class="mb-4"></div>

      <!-- Actions -->
      <div class="d-flex flex-wrap gap-3">
        <a href="/assessment.html" class="btn btn-primary">
          <i class="bi bi-arrow-repeat me-1"></i>Take Another Assessment
        </a>
        <a href="/history.html" class="btn btn-outline-secondary">
          <i class="bi bi-clock-history me-1"></i>View History
        </a>
        <a href="/dashboard.html" class="btn btn-outline-secondary">
          <i class="bi bi-house me-1"></i>Dashboard
        </a>
      </div>
    </div>

    <div id="noResults" class="text-center py-5 d-none">
      <i class="bi bi-clipboard2-x text-muted" style="font-size:3rem"></i>
      <h5 class="mt-3">No assessment found</h5>
      <p class="text-muted">Take your first assessment to see results here.</p>
      <a href="/assessment.html" class="btn btn-primary">Start Assessment</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/results.js"></script>
</body>
</html>
