<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare — Assessment History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-purple shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/dashboard.html"><i class="bi bi-heart-pulse-fill me-2"></i>MindCare</a>
      <a class="btn btn-outline-light btn-sm" href="#" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <a href="/dashboard.html" class="text-muted small text-decoration-none">
          <i class="bi bi-chevron-left me-1"></i>Dashboard
        </a>
        <h4 class="mt-1 fw-bold">My Assessment History</h4>
      </div>
      <a href="/assessment.html" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-circle me-1"></i>New Assessment
      </a>
    </div>

    <!-- 30-day trend chart -->
    <div class="card stat-card p-4 mb-4">
      <h6 class="fw-semibold mb-3"><i class="bi bi-graph-up me-2 text-purple"></i>30-Day Stress Trend</h6>
      <div class="chart-container" style="height:220px">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <!-- History table -->
    <div class="card stat-card p-4">
      <h6 class="fw-semibold mb-3"><i class="bi bi-table me-2 text-purple"></i>All Assessments</h6>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Date &amp; Time</th>
              <th>Score</th>
              <th>Stress Level</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
            <tr><td colspan="5" class="text-center py-4">
              <div class="spinner-border spinner-border-sm text-purple me-2"></div>Loading…
            </td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <nav id="paginationNav" class="d-none mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0" id="paginationList"></ul>
      </nav>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
