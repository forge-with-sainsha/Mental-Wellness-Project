<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare Admin — Assessments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body>
  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999"></div>

  <div class="d-flex">
    <aside class="admin-sidebar d-none d-lg-flex flex-column p-3" style="width:230px;min-height:100vh;position:fixed;top:0;left:0;z-index:100">
      <div class="admin-brand py-3 mb-3 border-bottom border-white border-opacity-25">
        <i class="bi bi-shield-lock-fill me-2"></i>MindCare Admin
      </div>
      <nav class="flex-grow-1">
        <ul class="nav flex-column">
          <li><a class="nav-link" href="/admin/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li><a class="nav-link" href="/admin/students.html"><i class="bi bi-people me-2"></i>Students</a></li>
          <li><a class="nav-link active" href="/admin/assessments.html"><i class="bi bi-clipboard-data me-2"></i>Assessments</a></li>
          <li><a class="nav-link" href="/admin/recommendations.html"><i class="bi bi-lightbulb me-2"></i>Recommendations</a></li>
        </ul>
      </nav>
      <div class="mt-auto pt-3 border-top border-white border-opacity-25">
        <a class="btn btn-outline-light btn-sm w-100" href="#" onclick="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      </div>
    </aside>

    <div class="flex-grow-1" style="margin-left:230px">
      <nav class="navbar navbar-dark d-lg-none" style="background:#1e1b4b">
        <div class="container-fluid px-3">
          <span class="navbar-brand">Admin</span>
          <a class="btn btn-outline-light btn-sm" href="#" onclick="logout()">Logout</a>
        </div>
      </nav>

      <main class="p-4">
        <div class="mb-4">
          <h4 class="fw-bold mb-0">All Assessments</h4>
          <p class="text-muted small">Browse and filter all student assessments</p>
        </div>

        <div class="card stat-card p-4">
          <!-- Filters -->
          <div class="row g-2 mb-3">
            <div class="col-md-6">
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="search" id="searchInput" class="form-control" placeholder="Search by name or email…">
              </div>
            </div>
            <div class="col-md-3">
              <select id="levelFilter" class="form-select">
                <option value="">All Levels</option>
                <option value="low">Low</option>
                <option value="moderate">Moderate</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="col-md-3">
              </button>
            </div>
          </div>

          <p class="text-muted small mb-3" id="resultSummary"></p>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Student</th>
                  <th>Email</th>
                  <th>Date</th>
                  <th>Score</th>
                  <th>Level</th>
                </tr>
              </thead>
              <tbody id="assessmentsTable">
                <tr><td colspan="6" class="text-center py-4">
                  <div class="spinner-border spinner-border-sm text-purple"></div> Loading…
                </td></tr>
              </tbody>
            </table>
          </div>

          <nav id="paginationNav" class="d-none mt-3">
            <ul class="pagination pagination-sm justify-content-center mb-0" id="paginationList"></ul>
          </nav>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/assessments.js"></script>
</body>
</html>
