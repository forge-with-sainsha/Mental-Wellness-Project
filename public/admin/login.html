<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare — Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100" style="background:#1e1b4b">
  <div class="container" style="max-width:420px">
    <div class="text-center mb-4">
      <div class="auth-brand text-white"><i class="bi bi-shield-lock-fill me-2"></i>MindCare</div>
      <p class="text-white-50 mt-1 small">Administrator Portal</p>
    </div>

    <div class="card auth-card p-4">
      <h5 class="mb-4 fw-semibold">Admin Sign In</h5>
      <div id="alertBox" class="alert alert-danger d-none py-2" role="alert"></div>

      <form id="adminLoginForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Admin Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="admin@system.com" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
          <span id="btnText"><i class="bi bi-shield-check me-1"></i>Sign In</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
      </form>

      <p class="text-center text-muted mt-4 mb-0 small">
        <a href="/index.html" class="text-muted">← Student portal</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/login.js"></script>
</body>
</html>
