<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare — Stress Assessment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-purple shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/dashboard.html"><i class="bi bi-heart-pulse-fill me-2"></i>MindCare</a>
      <a class="btn btn-outline-light btn-sm" href="#" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </nav>

  <main class="container py-4" style="max-width:760px">
    <div class="mb-4">
      <a href="/dashboard.html" class="text-muted small text-decoration-none">
        <i class="bi bi-chevron-left me-1"></i>Back to Dashboard
      </a>
      <h4 class="mt-2 fw-bold">Stress Assessment</h4>
      <p class="text-muted">Answer each question honestly. Your responses are confidential.</p>
    </div>

    <!-- Progress -->
    <div class="mb-4">
      <div class="d-flex justify-content-between small text-muted mb-1">
        <span id="progressLabel">Question 0 of 10</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress" style="height:6px">
        <div class="progress-bar bg-purple" id="progressBar" style="width:0%"></div>
      </div>
    </div>

    <!-- Rating legend -->
    <div class="card border-0 bg-light p-3 mb-4 small">
      <div class="row text-center g-2">
        <div class="col"><span class="badge bg-secondary">0</span> Never</div>
        <div class="col"><span class="badge bg-info">1</span> Rarely</div>
        <div class="col"><span class="badge bg-primary">2</span> Sometimes</div>
        <div class="col"><span class="badge bg-warning text-dark">3</span> Often</div>
        <div class="col"><span class="badge bg-danger">4</span> Always</div>
      </div>
    </div>

    <div id="loadingQuestions" class="text-center py-5">
      <div class="spinner-border text-purple"></div>
      <p class="mt-3 text-muted">Loading questions…</p>
    </div>

    <form id="assessmentForm" class="d-none" novalidate>
      <div id="questionsContainer"></div>

      <div id="formError" class="alert alert-danger d-none mt-3"></div>

      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn btn-primary px-4 py-2" id="submitBtn">
          <span id="btnText"><i class="bi bi-send me-1"></i>Submit Assessment</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
        <a href="/dashboard.html" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/assessment.js"></script>
</body>
</html>
