<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare — Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/wellness.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="container" style="max-width:460px">
    <div class="text-center mb-4">
      <div class="auth-brand"><i class="bi bi-heart-pulse-fill me-2"></i>MindCare</div>
      <p class="text-muted mt-1">Create your student account</p>
    </div>

    <div class="card auth-card p-4">
      <h5 class="mb-4 fw-semibold">Register</h5>
      <div id="alertBox" class="alert d-none py-2" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="fullName" class="form-control" placeholder="Jane Smith" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Min 8 chars" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="form-text">Must include uppercase, number, and special character.</div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
          <span id="btnText">Create Account</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0 small">
        Already have an account? <a href="/index.html" class="text-purple fw-semibold">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
